<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <title>Frontend Mentor | Newsletter sign-up form with success message</title>
</head>
<body class="bg-white sm:bg-zinc-700 flex justify-center items-center sm:min-h-screen">
  <div class="flex flex-col-reverse sm:flex-row justify-evenly items-center sm:bg-white sm:p-5 rounded-3xl">
    <div class="flex flex-col p-10 justify-center gap-4">
      <h1 class="text-4xl sm:text-6xl font-bold sm:font-semibold">Stay updated!</h1>
      <h2 class="text-md">Join 60,000+ product managers receiving monthly updates on:</h2>
      <div class="flex flex-col gap-1">
        <div class="flex flex-row gap-3">
          <img src="assets/images/icon-success.svg" class="w-4">
          <span class="text-sm font-normal">Product discovery and building what matters</span>
        </div>
        <div class="flex flex-row gap-3">
          <img src="assets/images/icon-success.svg" class="w-4">
          <span class="text-sm font-normal">Measuring to ensure updates are a success</span>
        </div>
        <div class="flex flex-row gap-3">
          <img src="assets/images/icon-success.svg" class="w-4">
          <span class="text-sm font-normal">And much more!</span>
        </div>
      </div>
      <span class="text-sm font-medium">Email address</span>
      <input type="text" placeholder="email@company.com" class="w-full bg-transparent border border-zinc-800 rounded-md h-12 flex justify-center items-center text-md pl-5">
      <button class="w-full bg-zinc-800 text-white font-medium rounded-md h-12 flex justify-center items-center text-md pl-5">Subscribe to monthly newsletter</button>
    </div>
    <img src="assets/images/illustration-sign-up-desktop.svg" class="hidden sm:block">
    <img src="assets/images/illustration-sign-up-mobile.svg" class="block w-full sm:hidden">
  </div>
</body>
</html>
